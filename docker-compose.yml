services:

  users-postgres:
    image: postgres:17
    container_name: users-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_db
    volumes:
      - users-postgres-data:/var/lib/postgresql/data

  charts-postgres:
    image: postgres:17
    container_name: charts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chart_db
    volumes:
      - charts-postgres-data:/var/lib/postgresql/data
  
  archive-postgres:
    image: postgres:17
    container_name: archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: archive_db
    volumes:
      - archive-postgres-data:/var/lib/postgresql/data
  
  analytics-postgres:
    image: postgres:17
    container_name: analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: analytics_db
    volumes:
      - analytics-postgres-data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: charts-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: charts-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  charts-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: charts-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://charts-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - charts-kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      sleep 10
      kafka-topics --create --topic reactions --bootstrap-server charts-kafka:9092 --partitions 1 --replication-factor 1
      kafka-topics --create --topic episodes --bootstrap-server charts-kafka:9092 --partitions 1 --replication-factor 1
      "

  user-service:
    build:
      context: ./user_service
    container_name: charts-user-service
    restart: unless-stopped
    depends_on:
      - users-postgres
      - redis
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@users-postgres:5432/${POSTGRES_USR_DB}?sslmode=disable
      REDIS_ADDR: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8081:8080"

  chart-service:
    build:
      context: ./chart_service
    container_name: charts-chart-service
    restart: unless-stopped
    depends_on:
      - charts-postgres
      - charts-kafka
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@charts-postgres:5432/${POSTGRES_CHRT_DB}?sslmode=disable
      KAFKA_BROKER: charts-kafka:9092
      USER_SERVICE_URL: http://charts-user-service:8080
      ANALYTICS_SERVICE_URL: http://charts-analytics-service:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8082:8080"
  
  archive-service:
    build:
      context: ./archive_service
    container_name: charts-archive-service
    restart: unless-stopped
    depends_on:
      - archive-postgres
      - charts-kafka
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@archive-postgres:5432/${POSTGRES_ARCHV_DB}?sslmode=disable
      KAFKA_BROKER: charts-kafka:9092
      KAFKA_GROUP_ID: archive-service
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8083:8080"

  analytics-service:
    build:
      context: ./analytics_service
    container_name: charts-analytics-service
    restart: unless-stopped
    depends_on:
      - analytics-postgres
      - charts-kafka
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@analytics-postgres:5432/${POSTGRES_ANLT_DB}?sslmode=disable
      KAFKA_BROKER: charts-kafka:9092
      KAFKA_GROUP_ID: analytics-service
      USER_SERVICE_URL: http://charts-user-service:8080
      ARCHIVE_SERVICE_URL: http://charts-archive-service:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8084:8080"

volumes:
  users-postgres-data:
  charts-postgres-data:
  archive-postgres-data:
  analytics-postgres-data:
  redis-data: